#:schema node_modules/wrangler/config-schema.json

name = "kbouffe-api"
main = "src/index.ts"
compatibility_date = "2025-07-01"
compatibility_flags = ["nodejs_compat"]

# --- R2 bucket (Images) ---
[[r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "kbouffe-images"

# ── Supabase Auth ──────────────────────────────────────────────────
# Set via `wrangler secret put <KEY_NAME>`:
#   SUPABASE_URL        — https://xxxxx.supabase.co
#   SUPABASE_ANON_KEY   — Your Supabase anon/public key
#   SUPABASE_SERVICE_ROLE_KEY — For admin bypass

[vars]
ENVIRONMENT = "production"

# ── SMS Queue ──────────────────────────────────────────────────────
[[queues.producers]]
binding = "SMS_QUEUE"
queue = "kbouffe-sms-queue"

[[queues.consumers]]
queue = "kbouffe-sms-queue"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "kbouffe-sms-dlq"

# ── MTN MoMo Secrets ───────────────────────────────────────────────
# Set via `wrangler secret put <KEY_NAME>`:
# MTN_COLLECTION_API_USER
# MTN_COLLECTION_API_KEY
# MTN_COLLECTION_SUBSCRIPTION_KEY
# MTN_WEBHOOK_SECRET
# MTN_DISBURSEMENT_API_USER
# MTN_DISBURSEMENT_API_KEY
# MTN_DISBURSEMENT_SUBSCRIPTION_KEY

# ── External Services ──────────────────────────────────────────────
# Set via `wrangler secret put <KEY_NAME>`:
# MTN_ADS_SUBSCRIPTION_KEY
# MTN_KYC_SUBSCRIPTION_KEY

# ── Marketplace (platform purchases) ───────────────────────────────
# Set via `wrangler secret put <KEY_NAME>`:
# PLATFORM_PAYEE_MSISDN       — numéro MoMo crédité pour les achats marketplace
# MARKETPLACE_WEBHOOK_SECRET  — bearer secret pour les webhooks marketplace


# ── Durable Objects — Rate Limiter ────────────────────────────────
[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiterDO"

[[migrations]]
tag = "v1"
new_classes = ["RateLimiterDO"]

# ── Workers AI ────────────────────────────────────────────────────
[ai]
binding = "AI"

# ── Scheduled data purge (1st of each month, 2am UTC) ──────────────
[triggers]
crons = ["0 2 1 * *"]
